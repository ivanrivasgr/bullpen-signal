# Pre-commit hooks for Bullpen Signal.
#
# Install: `pre-commit install` (only once, already done)
# Run manually: `pre-commit run --all-files`
# Autoupdate: `pre-commit autoupdate`
#
# Rationale:
#   - ruff format (check): enforces project formatting before CI does
#   - ruff check: catches lint errors (unused imports, etc.)
#   - basic hygiene: trailing whitespace, EOF newline, large files
#
# All configuration lives in pyproject.toml under [tool.ruff], so hooks
# stay in sync with CI automatically.

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.11
    hooks:
      - id: ruff-format
        name: ruff format (check)
        args: [--check]
      - id: ruff-check
        name: ruff check
        args: [--fix]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-added-large-files
        args: [--maxkb=1024]
      - id: check-yaml
      - id: check-toml
